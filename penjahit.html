  <!DOCTYPE html>
  <html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monito – Laporan Penjahit</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Global Style -->
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="stylesheet" href="./assets/penjahit.css" />

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Monito.">
    <meta name="theme-color" content="#E8603C">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">

    <!-- CSS khusus halaman ini (opsional) -->
    <style>
      /* tambahkan CSS spesifik halaman ini di sini */
    </style>
  </head>
  <body>

    <!-- Navbar di-inject otomatis oleh navbar.js -->

    <!-- KONTEN HALAMAN INI -->
    
        
          <div class="filter-bar">
            <select id="sel-bulan">
              <option value="">Semua Bulan</option>
              <option value="1">Januari</option><option value="2">Februari</option>
              <option value="3">Maret</option><option value="4">April</option>
              <option value="5">Mei</option><option value="6">Juni</option>
              <option value="7">Juli</option><option value="8">Agustus</option>
              <option value="9">September</option><option value="10">Oktober</option>
              <option value="11">November</option><option value="12">Desember</option>
            </select>
            <select id="sel-tahun"></select>
            <button class="btn-filter" onclick="loadData()">Tampilkan</button>
          </div>
          <div class="main">
            <div class="loading" id="loading-state">
              <div class="loading-spinner"></div>
              <div style="font-size:14px;">Memuat data...</div>
            </div>
            <div id="dashboard-content" style="display:none;"></div>
          </div>

      

    <!-- Global Navbar -->
    <script src="./assets/navbar.js"></script>

    <!-- Logic halaman ini -->
    <script>
  // Paste JS dari repo lama kamu di sini
  // Hapus bagian switchTab(), openMenu(), closeMenu(), toggleDark()
  // karena sudah ditangani navbar.js
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzJZPNIO4Gi5pHRFVDLzZqMpUkL_oM_iHd39IDmofvNf4hsVTVOcLk2V3DudD5fKaY/exec";
  const BULAN_NAMES = ["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const KAT_CONFIG = {
    totebag: { label:"Totebag",  fillClass:"fill-orange", pillClass:"pill-orange", dot:"#E8603C" },
    topi:    { label:"Topi",     fillClass:"fill-teal",   pillClass:"pill-teal",   dot:"#2BC4B4" },
    celemek: { label:"Celemek",  fillClass:"fill-blue",   pillClass:"pill-blue",   dot:"#5B8DEF" },
  };
  const AVATAR_COLORS = ["#E8603C","#2BC4B4","#5B8DEF","#F5A623","#9B59B6","#27AE60"];

  document.addEventListener('DOMContentLoaded', () => {
    populateYears();
    setDefaultFilter();
    loadData();
  });

  function populateYears() {
    const sel = document.getElementById('sel-tahun');
    const cur = new Date().getFullYear();
    for (let y = cur; y >= cur - 3; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y; sel.appendChild(o);
    }
  }
  function setDefaultFilter() {
    const now = new Date();
    document.getElementById('sel-bulan').value = now.getMonth() + 1;
    document.getElementById('sel-tahun').value = now.getFullYear();
  }

  async function loadData() {
    showLoading(true);
    const bulan = document.getElementById('sel-bulan').value;
    const tahun = document.getElementById('sel-tahun').value;
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?bulan=${bulan}&tahun=${tahun}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      renderDashboard(await res.json());
    } catch (err) { showError(err.message); }
  }

  function showLoading(on) {
    document.getElementById('loading-state').style.display = on ? 'block' : 'none';
    document.getElementById('dashboard-content').style.display = on ? 'none' : 'block';
  }
  function showError(msg) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';
    document.getElementById('dashboard-content').innerHTML =
    `<div class="error-msg">⚠️ Gagal memuat data: ${msg}<br><small style="margin-top:6px;display:block;">Pastikan Apps Script URL sudah benar dan sudah di-deploy sebagai Web App.</small></div>`;
  }

  function renderDashboard(d) {
    const bulanLabel = d.filter.bulan ? BULAN_NAMES[d.filter.bulan] : "Semua Bulan";
    const periodeLabel = `${bulanLabel} ${d.filter.tahun || ''}`.trim();
    const totalKat = (d.kategori.totebag + d.kategori.topi + d.kategori.celemek) || 1;

    const html = `
    <div class="sec-title">Ringkasan · ${periodeLabel}</div>
    <div class="kpi-grid">
    <div class="kpi-card c-orange">
    <span class="kpi-emoji">✂️</span>
    <div class="kpi-label">Total Potongan</div>
    <div class="kpi-value">${fmt(d.totalPotongan)}</div>
    <div class="kpi-sub">semua bahan</div>
    </div>
    <div class="kpi-card c-blue">
    <span class="kpi-emoji">👜</span>
    <div class="kpi-label">Totebag</div>
    <div class="kpi-value">${fmt(d.kategori.totebag)}</div>
    <div class="kpi-sub">${pct(d.kategori.totebag,totalKat)}% dari total</div>
    </div>
    <div class="kpi-card c-teal">
    <span class="kpi-emoji">🧢</span>
    <div class="kpi-label">Topi</div>
    <div class="kpi-value">${fmt(d.kategori.topi)}</div>
    <div class="kpi-sub">${pct(d.kategori.topi,totalKat)}% dari total</div>
    </div>
    <div class="kpi-card c-yellow">
    <span class="kpi-emoji">👘</span>
    <div class="kpi-label">Celemek</div>
    <div class="kpi-value">${fmt(d.kategori.celemek)}</div>
    <div class="kpi-sub">${pct(d.kategori.celemek,totalKat)}% dari total</div>
    </div>
    <div class="kpi-card c-green">
    <span class="kpi-emoji">👥</span>
    <div class="kpi-label">Jumlah Penjahit</div>
    <div class="kpi-value">${d.jumlahPenjahit}</div>
    <div class="kpi-sub">${d.namaPenjahit.join(', ')}</div>
    </div>
    </div>

    <div class="sec-title">Jahitan Tersedia · ${(d.belumDijahit || []).length} item</div>
    <div class="antrian-wrap">
    ${(d.belumDijahit && d.belumDijahit.length > 0) ? `
      <table class="antrian-table">
      <thead>
      <tr>
      <th>No. PO</th>
      <th>Jenis Bahan</th>
      <th>Jumlah</th>
      </tr>
      </thead>
      <tbody>
      ${d.belumDijahit.map(item => `
        <tr>
        <td><span class="antrian-nopo">${item.noPo || '—'}</span></td>
        <td>${item.jenisBahan}</td>
        <td>${fmt(item.jumlah)}</td>
        </tr>`).join('')}
      </tbody>
      </table>` : `<div class="antrian-empty">✅ Semua jahitan sudah dikerjakan</div>`}
      </div>

      <div class="sec-title">Sedang Dijahit · ${(d.onProses || []).length} item</div>
      <div class="antrian-wrap">
      ${(d.onProses && d.onProses.length > 0) ? `
        <table class="antrian-table">
        <thead>
        <tr>
        <th>No. PO</th>
        <th>Jenis Bahan</th>
        <th>Penjahit</th>
        <th>Tgl Keluar</th>
        <th>Jumlah</th>
        </tr>
        </thead>
        <tbody>
        ${d.onProses.map(item => `
         <tr>
         <td><span class="antrian-nopo">${item.noPo || '—'}</span></td>
         <td>${item.jenisBahan}</td>
         <td>${item.penjahit?.join(', ') || '—'}</td>
         <td style="font-size:11px;color:var(--ink3);">${item.tglKeluar}</td>
         <td>${fmt(item.jumlah)}</td>
         </tr>`).join('')}
        </tbody>
        </table>` : `<div class="antrian-empty">🪡 Tidak ada jahitan yang sedang diproses</div>`}
        </div>

        ${(d.penjahitTerbaik || d.penjahitTercepat) ? `
          <div class="sec-title">Penghargaan Bulan Ini</div>
          <div class="award-grid">
          ${d.penjahitTerbaik ? `
            <div class="award-card">
            <div class="award-icon">🏆</div>
            <div>
            <div class="award-label">Penjahit Terbaik</div>
            <div class="award-name">${d.penjahitTerbaik}</div>
            <div class="award-detail">Jahitan terbanyak bulan ini</div>
            </div>
            </div>` : ''}
            ${d.penjahitTercepat ? `
              <div class="award-card">
              <div class="award-icon">⚡</div>
              <div>
              <div class="award-label">Penjahit Tercepat</div>
              <div class="award-name">${d.penjahitTercepat.nama}</div>
              <div class="award-detail">Rata-rata ${d.penjahitTercepat.rataHari} hari / order</div>
              </div>
              </div>` : ''}
              </div>` : ''}

              <div class="two-col">
              <div class="panel">
              <div class="panel-title">📊 Distribusi Kategori</div>
              ${['totebag','topi','celemek'].map(k => `
                <div class="kat-item">
                <div class="kat-header">
                <span class="kat-name">${KAT_CONFIG[k].label}</span>
                <span class="kat-num">${fmt(d.kategori[k])}</span>
                </div>
                <div class="bar-track">
                <div class="bar-fill ${KAT_CONFIG[k].fillClass}" style="width:${pct(d.kategori[k],totalKat)}%"></div>
                </div>
                </div>`).join('')}
              </div>
              <div class="panel">
              <div class="panel-title">🧵 Performa Penjahit</div>
              <div class="table-scroll-hint">← geser untuk lihat semua →</div>
              <div class="table-scroll-wrap">
              <table class="penjahit-table">
              <thead>
              <tr>
              <th>Penjahit</th><th>Total</th>
              <th><span class="pill pill-orange">Totebag</span></th>
              <th><span class="pill pill-teal">Topi</span></th>
              <th><span class="pill pill-blue">Celemek</span></th>
              <th>Rata Hari</th>
              </tr>
              </thead>
              <tbody>
              ${d.penjahit.sort((a,b)=>b.total-a.total).map((p,i) => `
                <tr>
                <td>
                <div class="penjahit-name">
                <div class="penjahit-avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]}">
                ${p.nama.charAt(0).toUpperCase()}
                </div>
                ${p.nama}
                </div>
                </td>
                <td><strong>${fmt(p.total)}</strong></td>
                <td>${fmt(p.totebag)}</td>
                <td>${fmt(p.topi)}</td>
                <td>${fmt(p.celemek)}</td>
                <td>${p.rataHariPengerjaan ? p.rataHariPengerjaan+'h' : '—'}</td>
                </tr>`).join('')}
              </tbody>
              </table>
              </div>
              </div>
              </div>

              <div class="sec-title">Detail Bahan</div>
              <div class="bahan-grid">
              ${d.bahanDetail.sort((a,b)=>b.jumlah-a.jumlah).map(b => `
                <div class="bahan-chip">
                <div class="bahan-chip-dot" style="background:${KAT_CONFIG[b.kategori]?.dot||'#ccc'}"></div>
                <div class="bahan-chip-name" title="${b.nama}">${b.nama}</div>
                <div class="bahan-chip-num">${fmt(b.jumlah)}</div>
                </div>`).join('')}
              </div>
              `;

              document.getElementById('dashboard-content').innerHTML = html;
              showLoading(false);
              setTimeout(() => {
                document.querySelectorAll('.bar-fill').forEach(el => {
                  const w = el.style.width; el.style.width = '0';
                  requestAnimationFrame(() => { el.style.width = w; });
                });
              }, 50);
            }

            function fmt(n) { return Number(n||0).toLocaleString('id-ID'); }
            function pct(a,b) { return b ? Math.round((a/b)*100) : 0; }
          </script>

        </body>
        </html>
