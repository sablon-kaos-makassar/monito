<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monito – Presensi</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Global Style -->
<link rel="stylesheet" href="./assets/style.css" />

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Monito.">
<meta name="theme-color" content="#E8603C">
<link rel="apple-touch-icon" href="./icons/icon-192.png">

<!-- CSS khusus halaman Presensi -->
<style>
  .kpi-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 24px; }
  .kpi-card { border-radius: var(--radius); padding: 16px 14px; animation: fadeUp .45s both; }
  .kpi-card.c-orange { background: #FEF0EC; }
  .kpi-card.c-blue   { background: #EEF3FE; }
  .kpi-card.c-teal   { background: #EBF8F8; }
  .kpi-card.c-yellow { background: #FEF9EC; }
  .kpi-emoji  { font-size: 22px; margin-bottom: 8px; display: block; }
  .kpi-label  { font-size: 12px; font-weight: 500; color: var(--ink2); margin-bottom: 4px; }
  .kpi-value  { font-size: clamp(20px,5vw,30px); font-weight: 800; line-height: 1; color: var(--ink); }
  .kpi-sub    { font-size: 11px; color: var(--ink3); margin-top: 5px; line-height: 1.4; }
  .kpi-card:nth-child(1){ animation-delay:.05s }
  .kpi-card:nth-child(2){ animation-delay:.10s }
  .kpi-card:nth-child(3){ animation-delay:.15s }
  .kpi-card:nth-child(4){ animation-delay:.20s }

  .award-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 24px; }
  .award-card { border-radius: var(--radius); padding: 16px; animation: fadeUp .5s both; }
  .award-card.best { background: var(--orange); box-shadow: 0 4px 16px rgba(232,96,60,.25); }
  .award-card.grow { background: #FEF9EC; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
  .award-head { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
  .award-icon { font-size: 24px; width: 48px; height: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
  .award-card.best .award-icon { background: rgba(255,255,255,.2); }
  .award-card.grow .award-icon { background: rgba(245,166,35,.15); }
  .award-tag  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
  .award-card.best .award-tag  { color: rgba(255,255,255,.75); }
  .award-card.grow .award-tag  { color: #B07800; }
  .award-name { font-size: 19px; font-weight: 800; line-height: 1.15; margin-bottom: 4px; }
  .award-card.best .award-name { color: #fff; }
  .award-card.grow .award-name { color: var(--ink); }
  .award-quote { font-size: 12px; line-height: 1.55; }
  .award-card.best .award-quote { color: rgba(255,255,255,.72); }
  .award-card.grow .award-quote { color: var(--ink3); }
  .award-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .award-stat  { border-radius: 10px; padding: 9px 12px; }
  .award-card.best .award-stat { background: rgba(255,255,255,.18); }
  .award-card.grow .award-stat { background: rgba(0,0,0,.05); }
  .award-stat-label { font-size: 11px; font-weight: 500; margin-bottom: 2px; }
  .award-card.best .award-stat-label { color: rgba(255,255,255,.65); }
  .award-card.grow .award-stat-label { color: var(--ink3); }
  .award-stat-val { font-size: 14px; font-weight: 700; }
  .award-card.best .award-stat-val { color: #fff; }
  .award-card.grow .award-stat-val { color: var(--ink); }
  .award-score-head { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .award-card.best .award-score-head { color: rgba(255,255,255,.8); }
  .award-card.grow .award-score-head { color: var(--ink2); }
  .award-score-track { height: 8px; border-radius: 99px; overflow: hidden; }
  .award-card.best .award-score-track { background: rgba(255,255,255,.25); }
  .award-card.grow .award-score-track { background: rgba(0,0,0,.08); }
  .award-score-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.4,0,.2,1); }
  .award-card.best .award-score-fill { background: #fff; }
  .award-card.grow .award-score-fill { background: #F5A623; }

  .rank-list { display: flex; flex-direction: column; gap: 0; }
  .rank-row  { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .rank-row:last-child { border-bottom: none; }
  .rank-num  { font-size: 13px; font-weight: 800; width: 22px; text-align: center; flex-shrink: 0; color: var(--ink3); font-family: 'DM Mono', monospace; }
  .rank-row:nth-child(1) .rank-num { color: #F5A623; }
  .rank-row:nth-child(2) .rank-num { color: #9B9A95; }
  .rank-row:nth-child(3) .rank-num { color: #C8864E; }
  .rank-avatar { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .rank-info  { flex: 1; min-width: 0; }
  .rank-name  { font-size: 13px; font-weight: 700; color: var(--ink); }
  .rank-sub   { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .rank-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .rank-track { width: 64px; height: 5px; background: #F0F0F0; border-radius: 99px; overflow: hidden; }
  .rank-fill  { height: 100%; border-radius: 99px; background: var(--orange); transition: width 1s cubic-bezier(.4,0,.2,1); }
  .rank-score { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--ink2); width: 24px; text-align: right; }

  .table-scroll-hint { font-size: 10px; color: var(--ink3); text-align: right; margin-bottom: 6px; }
  .table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .rekap-table { width: 100%; min-width: 560px; border-collapse: collapse; font-size: 12px; }
  .rekap-table th {
    text-align: left; padding: 7px 8px; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; color: var(--ink3);
    border-bottom: 1.5px solid var(--border); background: #FAFAFA;
  }
  .rekap-table th:not(:first-child) { text-align: right; }
  .rekap-table td { padding: 10px 8px; border-bottom: 1px solid var(--border); color: var(--ink); vertical-align: middle; }
  .rekap-table td:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; }
  .rekap-table tr:last-child td { border-bottom: none; }
  .rekap-table tr:hover td { background: var(--orange-lt); }
  .emp-name-cell { display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .emp-avatar { width: 28px; height: 28px; border-radius: 9px; font-size: 11px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .net-pill  { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .net-pos   { background: #EDFAF3; color: #1A9E6A; }
  .net-neg   { background: #FEF0EC; color: var(--orange-dk); }
  .net-zero  { background: #F5F5F5; color: var(--ink3); }

  @media (min-width: 700px) {
    .kpi-grid  { grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 12px; }
    .award-grid { grid-template-columns: repeat(2,1fr); }
    .two-col   { display: grid; grid-template-columns: 1fr 1.6fr; gap: 16px; margin-bottom: 24px; }
    .two-col .panel { margin-bottom: 0; }
    .table-scroll-hint { display: none; }
  }
</style>
</head>
<body>

<!-- Navbar di-inject otomatis oleh navbar.js -->

<div class="filter-bar">
  <select id="sel-bulan">
    <option value="1">Januari</option><option value="2">Februari</option>
    <option value="3">Maret</option><option value="4">April</option>
    <option value="5">Mei</option><option value="6">Juni</option>
    <option value="7">Juli</option><option value="8">Agustus</option>
    <option value="9">September</option><option value="10">Oktober</option>
    <option value="11">November</option><option value="12">Desember</option>
  </select>
  <select id="sel-tahun"></select>
  <button class="btn-filter" onclick="loadData()">Tampilkan</button>
</div>

<div class="main">
  <div class="loading" id="loading-state">
    <div class="loading-spinner"></div>
    <div style="font-size:14px;">Memuat data...</div>
  </div>
  <div id="dashboard-content" style="display:none;"></div>
</div>

<!-- Global Navbar -->
<script src="./assets/navbar.js"></script>

<!-- Presensi Logic -->
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzdnuBcu7U9PEZI6gg_MoOS6kLhbLw72sB7pmJGF7mfLEgg5YAVbFwDksovoSvRryCp/exec";

const BULAN_NAMES = ["","Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const AVATAR_COLORS = ["#E8603C","#2BC4B4","#5B8DEF","#F5A623","#9B59B6","#27AE60"];
const RANK_FILL_COLORS = ["#E8603C","#F07A5A","#F5957A","#FAB59F","#FCD4C6","#FEE8E2"];

const Q_BEST = [n => `Konsistensi adalah kekuatan terbesar. ${n} hadir penuh dan selalu tepat waktu — teladan nyata bagi tim.`];
const Q_GROW = [n => `Setiap hari baru adalah kesempatan untuk tampil lebih baik. Dengan sedikit penyesuaian, ${n} bisa melompat jauh bulan depan.`];

document.addEventListener('DOMContentLoaded', () => {
  const selY = document.getElementById('sel-tahun');
  const cur = new Date().getFullYear();
  for (let y = cur; y >= cur - 3; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === cur) o.selected = true;
    selY.appendChild(o);
  }
  document.getElementById('sel-bulan').value = new Date().getMonth() + 1;
  loadData();
});

async function loadData() {
  showLoading(true);
  const b = document.getElementById('sel-bulan').value;
  const y = document.getElementById('sel-tahun').value;
  try {
    const res = await fetch(`${API_URL}?action=dashboard&bulan=${b}&tahun=${y}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderDashboard(data, parseInt(b), parseInt(y));
  } catch (err) { showError(err.message); }
}

function showLoading(on) {
  document.getElementById('loading-state').style.display = on ? 'block' : 'none';
  document.getElementById('dashboard-content').style.display = on ? 'none' : 'block';
}
function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('dashboard-content').style.display = 'block';
  document.getElementById('dashboard-content').innerHTML =
    `<div class="error-msg">⚠️ Gagal memuat data: ${msg}<br>
     <small style="margin-top:6px;display:block;">Pastikan Apps Script URL sudah benar dan sudah di-deploy sebagai Web App.</small></div>`;
}

function fmtRp(v) {
  if (!v || v === 0) return 'Rp0';
  const abs = Math.abs(v);
  const str = abs >= 1000000 ? (abs/1000000).toFixed(1).replace('.0','')+'jt' : Math.round(abs/1000)+'rb';
  return (v < 0 ? '-' : '+') + 'Rp' + str;
}
function initials(n) { return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

function renderDashboard(data, b, y) {
  const { summary, scores, rekap } = data;
  const periodeLabel  = `${BULAN_NAMES[b]} ${y}`;
  const totalKaryawan = rekap.length;
  const avgJam        = summary.rerataMasukGlobal || '—';
  const best          = scores[0];
  const grow          = scores[scores.length - 1];
  const totalHari     = Math.max(...rekap.map(r => r.hariKerja || r.hadir || 1));

  const html = `
    <div class="sec-title">Ringkasan · ${periodeLabel}</div>
    <div class="kpi-grid">
      <div class="kpi-card c-orange">
        <span class="kpi-emoji">👥</span>
        <div class="kpi-label">Total Karyawan</div>
        <div class="kpi-value">${totalKaryawan}</div>
        <div class="kpi-sub">aktif bulan ini</div>
      </div>
      <div class="kpi-card c-blue">
        <span class="kpi-emoji">🕐</span>
        <div class="kpi-label">Rerata Jam Masuk</div>
        <div class="kpi-value">${avgJam}</div>
        <div class="kpi-sub">rata-rata semua</div>
      </div>
      <div class="kpi-card c-yellow">
        <span class="kpi-emoji">⚠️</span>
        <div class="kpi-label">Total Denda</div>
        <div class="kpi-value" style="font-size:clamp(16px,4vw,24px);">${fmtRp(summary.totalDenda)}</div>
        <div class="kpi-sub">${summary.dendaCount} karyawan terdenda</div>
      </div>
      <div class="kpi-card c-teal">
        <span class="kpi-emoji">📈</span>
        <div class="kpi-label">Total Lembur</div>
        <div class="kpi-value" style="font-size:clamp(16px,4vw,24px);">${fmtRp(summary.totalLembur)}</div>
        <div class="kpi-sub">${summary.lemburCount} karyawan</div>
      </div>
    </div>

    <div class="sec-title">Spotlight Karyawan</div>
    <div class="award-grid">
      ${best ? (() => {
        const rBest = rekap.find(r => r.nama === best.nama) || {};
        return `
        <div class="award-card best">
          <div class="award-head">
            <div class="award-icon">🏆</div>
            <div>
              <div class="award-tag">Bintang Bulan Ini</div>
              <div class="award-name">${best.nama}</div>
              <div class="award-quote">${Q_BEST[0](best.nama)}</div>
            </div>
          </div>
          <div class="award-stats">
            <div class="award-stat">
              <div class="award-stat-label">Kehadiran</div>
              <div class="award-stat-val">${rBest.hadir||0} / ${totalHari} hari</div>
            </div>
            <div class="award-stat">
              <div class="award-stat-label">Rerata masuk</div>
              <div class="award-stat-val">${best.rerataMasuk||'—'}</div>
            </div>
          </div>
          <div class="award-score-head"><span>Skor keseluruhan</span><span>${best.skor} / 100</span></div>
          <div class="award-score-track"><div class="award-score-fill" style="width:0%" data-w="${best.skor}%"></div></div>
        </div>`;
      })() : ''}
      ${grow && grow.nama !== best?.nama ? (() => {
        const rGrow = rekap.find(r => r.nama === grow.nama) || {};
        return `
        <div class="award-card grow">
          <div class="award-head">
            <div class="award-icon">🌱</div>
            <div>
              <div class="award-tag">Ruang untuk Tumbuh</div>
              <div class="award-name">${grow.nama}</div>
              <div class="award-quote">${Q_GROW[0](grow.nama)}</div>
            </div>
          </div>
          <div class="award-stats">
            <div class="award-stat">
              <div class="award-stat-label">Kehadiran</div>
              <div class="award-stat-val">${rGrow.hadir||0} / ${totalHari} hari</div>
            </div>
            <div class="award-stat">
              <div class="award-stat-label">Rerata masuk</div>
              <div class="award-stat-val">${grow.rerataMasuk||'—'}</div>
            </div>
          </div>
          <div class="award-score-head"><span>Skor keseluruhan</span><span>${grow.skor} / 100</span></div>
          <div class="award-score-track"><div class="award-score-fill" style="width:0%" data-w="${grow.skor}%"></div></div>
        </div>`;
      })() : ''}
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="panel-title">🏅 Peringkat Karyawan</div>
        <div class="rank-list">
          ${scores.map((e, i) => `
          <div class="rank-row">
            <span class="rank-num">${i+1}</span>
            <div class="rank-avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]}">${initials(e.nama)}</div>
            <div class="rank-info">
              <div class="rank-name">${e.nama}</div>
              <div class="rank-sub">${e.rerataMasuk||'—'} avg masuk</div>
            </div>
            <div class="rank-right">
              <div class="rank-track">
                <div class="rank-fill" style="width:0%;background:${RANK_FILL_COLORS[Math.min(i,5)]}" data-w="${e.skor}%"></div>
              </div>
              <span class="rank-score">${e.skor}</span>
            </div>
          </div>`).join('')}
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">📋 Rekap Karyawan</div>
        <div class="table-scroll-hint">← geser untuk lihat semua →</div>
        <div class="table-scroll-wrap">
          <table class="rekap-table">
            <thead>
              <tr>
                <th>Karyawan</th><th>Hadir</th><th>Izin</th><th>Sakit</th>
                <th>Alfa</th><th>Lembur</th><th>Denda</th><th>Net</th>
              </tr>
            </thead>
            <tbody>
              ${rekap.map((e, i) => {
                const net = e.net || 0;
                const pillCls = net > 0 ? 'net-pos' : net < 0 ? 'net-neg' : 'net-zero';
                const alfa = e.alfa || 0;
                return `<tr>
                  <td><div class="emp-name-cell">
                    <div class="emp-avatar" style="background:${AVATAR_COLORS[i%AVATAR_COLORS.length]}">${initials(e.nama)}</div>
                    ${e.nama}
                  </div></td>
                  <td>${e.hadir}</td>
                  <td>${e.izin}</td>
                  <td>${e.sakit}</td>
                  <td style="color:${alfa>0?'var(--orange-dk)':'var(--ink3)'};">${alfa}</td>
                  <td style="color:${(e.totalLembur||0)>0?'#1A9E6A':'var(--ink3)'};">${fmtRp(e.totalLembur||0)}</td>
                  <td style="color:${(e.totalDenda||0)<0?'var(--orange-dk)':'var(--ink3)'};">${fmtRp(e.totalDenda||0)}</td>
                  <td><span class="net-pill ${pillCls}">${fmtRp(net)}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  document.getElementById('dashboard-content').innerHTML = html;
  showLoading(false);
  setTimeout(() => {
    document.querySelectorAll('.rank-fill[data-w], .award-score-fill[data-w]').forEach(el => {
      el.style.width = el.dataset.w;
    });
  }, 80);
}
</script>

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.log('SW error:', err));
    });
  }
</script>
</body>
</html>
